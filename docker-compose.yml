services:
  db:
    image: postgres:17
    container_name: legacy_db
    environment:
      POSTGRES_DB: legacy_payments
      POSTGRES_USER: legacy_user
      POSTGRES_PASSWORD: legacy_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./seeder.sql:/docker-entrypoint-initdb.d/02-seeder.sql:ro

  haskell:
    image: haskell:9.10
    container_name: legacy_haskell
    volumes:
      - .:/app
    working_dir: /app
    command: ["ghci", "legacy.hs"]
    depends_on:
      - db

volumes:
  postgres_data: